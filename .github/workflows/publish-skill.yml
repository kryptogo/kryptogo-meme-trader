name: Publish

on:
  push:
    tags: ['v*']

jobs:
  publish-skill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Publish to ClawHub
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npx clawhub publish \
            --version "$VERSION" \
            --tags "latest,crypto,defi,meme,solana,trading" \
            --name "KryptoGO Meme Trader" \
            "./skill"
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}

  publish-pypi:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build package
        run: |
          pip install build
          cd mcp-server && python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: mcp-server/dist/
